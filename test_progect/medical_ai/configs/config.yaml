# ======================================
#  MedicalAI — Master Configuration
# ======================================

project:
  name: "MedicalAI"
  version: "1.0.0"
  seed: 42

# ── Paths ────────────────────────────────────────────
paths:
  data_dir: "data/raw"
  processed_dir: "data/processed"
  model_dir: "outputs/models"
  log_dir: "outputs/logs"
  onnx_dir: "outputs/onnx"
  guideline_dir: "data/guidelines"        # ACC/AHA, NICE PDFs

# ── Data ─────────────────────────────────────────────
data:
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  max_seq_len: 512                         # ClinicalBERT token limit
  numerical_features:
    - age
    - bmi
    - systolic_bp
    - diastolic_bp
    - heart_rate
    - respiratory_rate
    - temperature_celsius
    - spo2
    - hemoglobin
    - wbc
    - platelets
    - creatinine
    - bun
    - sodium
    - potassium
    - glucose
    - hba1c
    - ldl
    - hdl
    - triglycerides
    - alt
    - ast
    - bilirubin
    - troponin
    - bnp
    - crp
    - esr
    - ferritin
    - tsh
    - ft4
  categorical_features:
    - sex                                  # 0=female, 1=male, 2=other
    - smoking_status                       # 0=never,1=former,2=current
    - alcohol_use                          # 0=none,1=moderate,2=heavy
    - diabetes_type                        # 0=none,1=T1,2=T2
    - family_hx_cancer
    - family_hx_cvd
  top_k_diseases: 10                       # Return top-N predictions

# ── Tabular Encoder ───────────────────────────────────
tabular:
  xgb:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    use_label_encoder: false
    eval_metric: "logloss"
  tabnet:
    n_d: 64
    n_a: 64
    n_steps: 5
    gamma: 1.3
    n_shared: 2
    output_dim: 256                        # embedding dimension

# ── NLP Encoder ───────────────────────────────────────
nlp:
  model_name: "emilyalsentzer/Bio_ClinicalBERT"
  output_dim: 256
  freeze_layers: 6                         # freeze first N BERT layers
  dropout: 0.1

# ── Fusion Transformer ───────────────────────────────
fusion:
  input_dim: 512                           # 256 tabular + 256 nlp
  hidden_dim: 512
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  ff_dim: 2048

# ── Classifier ───────────────────────────────────────
classifier:
  num_diseases: 1000                       # ICD-10 target classes
  hidden_dim: 256
  dropout: 0.2
  threshold: 0.35                          # decision boundary

# ── Training ─────────────────────────────────────────
training:
  epochs: 50
  batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_clip: 1.0
  early_stopping_patience: 7
  focal_loss_gamma: 2.0                   # focal loss for imbalance
  mixed_precision: true
  num_workers: 4
  save_best_metric: "auroc_macro"

# ── Calibration ──────────────────────────────────────
calibration:
  method: "temperature_scaling"
  max_iter: 50
  lr: 0.01

# ── RAG Recommender ──────────────────────────────────
rag:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k_chunks: 5
  chunk_size: 512
  chunk_overlap: 64
  vector_store: "faiss"

# ── API ───────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  max_request_size_mb: 5
  rate_limit_per_minute: 120
  jwt_expiry_hours: 8
  cache_ttl_seconds: 300

# ── Monitoring ───────────────────────────────────────
monitoring:
  enable_prometheus: true
  prometheus_port: 9090
  log_level: "INFO"
  audit_log_path: "outputs/logs/audit.jsonl"
